<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Black Science Institute — Structural Plenitude Theory</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
--bg:#000;
--fg:#f0f0f0;
--muted:#aaa;
--accent:#fff;
--accent-glow:rgba(255,255,255,0.12);
--border:rgba(255,255,255,0.1);
--radius:12px;
--transition:0.4s ease;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
overflow-x:hidden;
}

body{
background:var(--bg);
color:var(--fg);
font-family:'Roboto',sans-serif;
font-weight:300;
line-height:1.7;
}

a{color:inherit;text-decoration:none;}

.shell{
max-width:1280px;
margin:0 auto;
padding:0 5%;
}

/* HEADER */
header{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--border);
transition:background 0.4s;
}

header.scrolled{
background:rgba(0,0,0,0.85);
}

nav{
height:90px;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-family:'Montserrat',sans-serif;
font-size:1.5rem;
letter-spacing:0.2em;
font-weight:500;
opacity:0.95;
white-space:nowrap;
}

.nav-links{
display:flex;
gap:48px;
font-family:'Montserrat',sans-serif;
font-size:0.95rem;
letter-spacing:0.15em;
text-transform:uppercase;
}

.nav-links a{
opacity:0.8;
transition:var(--transition);
}

.nav-links a:hover{
opacity:1;
transform:translateY(-3px);
}

.hamburger{
display:none;
font-size:1.6rem;
cursor:pointer;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
overflow:hidden;
background:#000;
}

.hero-bg{
position:absolute;
inset:0;
background:url('./assets/images/bsi-moon.png') center/cover no-repeat;
opacity:0.65;
z-index:1;
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.7) 100%);
z-index:2;
}

.hero-content{
position:relative;
z-index:3;
max-width:1100px;
padding:0 5%;
}

.hero-title{
font-family:'Montserrat',sans-serif;
font-size:clamp(3.5rem,8vw,7.5rem);
font-weight:300;
letter-spacing:0.1em;
margin-bottom:32px;
line-height:1.05;
}

.hero-subtitle{
font-size:clamp(1.2rem,3vw,1.8rem);
max-width:880px;
margin:0 auto 64px;
opacity:0.9;
line-height:1.6;
}

.hero-tags{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.tag{
padding:12px 28px;
border:1px solid var(--border);
border-radius:999px;
font-size:0.9rem;
letter-spacing:0.15em;
opacity:0.9;
transition:var(--transition);
}

.tag:hover{
background:var(--accent-glow);
transform:translateY(-4px);
}

/* SECTIONS */
section{
padding:clamp(120px,15vh,180px) 0;
}

.section-title{
font-family:'Montserrat',sans-serif;
font-size:clamp(2.4rem,5vw,4rem);
font-weight:300;
letter-spacing:0.15em;
text-align:center;
margin-bottom:80px;
text-transform:uppercase;
}

.cards-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:40px;
margin-top:80px;
}

.card{
padding:48px 36px;
border:1px solid var(--border);
border-radius:var(--radius);
background:rgba(255,255,255,0.03);
backdrop-filter:blur(10px);
transition:var(--transition);
}

.card:hover{
transform:translateY(-16px);
border-color:var(--accent);
box-shadow:0 24px 48px rgba(0,0,0,0.5);
}

footer{
padding:120px 0 60px;
text-align:center;
border-top:1px solid var(--border);
font-size:0.95rem;
opacity:0.8;
}

/* ================= MOBILE FIX ================= */

@media(max-width:768px){

.shell{
padding:0 20px;
}

nav{
height:80px;
}

.logo{
font-size:1rem;
letter-spacing:0.12em;
}

.nav-links{
display:none;
flex-direction:column;
gap:28px;
position:absolute;
top:80px;
left:0;
width:100%;
background:rgba(0,0,0,0.96);
padding:40px 0;
text-align:center;
border-bottom:1px solid var(--border);
}

.nav-links.active{
display:flex;
}

.hamburger{
display:block;
margin-left:auto;
}

.hero{
min-height:90vh;
padding:120px 0 80px;
}

.hero-title{
font-size:clamp(2.6rem,6vw,4rem);
}

.hero-subtitle{
font-size:1rem;
margin-bottom:48px;
}

.hero-tags{
flex-direction:column;
gap:14px;
}

.tag{
width:100%;
}

}

</style>
</head>

<body>

<header>
<div class="shell">
<nav>
<div class="logo">BLACK SCIENCE INSTITUTE</div>

<div class="nav-links" id="navMenu">
<a href="index.html">Home</a>
<a href="structural-plenitude-theory.html">SPT</a>
<a href="phenomena.html">Phenomena</a>
<a href="research.html">Research</a>
<a href="#contact">Contact</a>
</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>
</nav>
</div>
</header>

<section class="hero">
<div class="hero-bg"></div>
<div class="hero-overlay"></div>
<div class="hero-content">
<h1 class="hero-title">Structural Plenitude Theory</h1>
<p class="hero-subtitle">
The vacuum is not empty. It is a continuous, viscoelastic, and dense substrate — the Pleroma.
</p>
<div class="hero-tags">
<div class="tag">SPT v1.4</div>
<div class="tag">Pleroma Substrate</div>
<div class="tag">Viscoelastic Vacuum</div>
<div class="tag">3I/ATLAS Analysis</div>
</div>
</div>
</section>

<footer>
<div class="shell">
© 2026 Black Science Institute
</div>
</footer>

<script>
function toggleMenu(){
document.getElementById('navMenu').classList.toggle('active');
}

window.addEventListener('scroll',()=>{
const heroBg=document.querySelector('.hero-bg');
if(heroBg){
heroBg.style.transform=`translateY(${window.scrollY*0.25}px)`;
}
document.querySelector('header').classList.toggle('scrolled',window.scrollY>100);
});
</script>

</body>
</html>
